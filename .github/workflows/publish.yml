name: Publish Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish"
        required: true
        default: "v0.2.3"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Show npm version
        run: npm --version

      - name: Verify
        run: npm run verify

      - name: Request npm OIDC token
        run: |
          response="$(curl -sSf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")"
          token="$(node -e "process.stdout.write(JSON.parse(process.argv[1]).value)" "$response")"
          echo "::add-mask::$token"
          echo "NPM_ID_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Publish
        run: npm publish --provenance
